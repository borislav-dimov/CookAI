<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<title>ChefAI - Camera</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body class="{{ 'dark-mode' if userSettings.mode == 'dark' else '' }}">

<div class="app-shell" id="appShell">
    <div class="top-bar">
        <div class="header-title" id="ui-record-ingredients">Take a Photo of Ingredients</div>
    </div>

    <div class="camera-container" id="camera-screen">
        <video id="video-feed" autoplay playsinline></video>
        <canvas id="photoCanvas"></canvas>
        <input type="file" id="galleryInput" accept="image/*" onchange="handleGalleryUpload()">

        <!-- Upload moved here as a floating + button -->
        <button class="fab-upload" type="button" aria-label="Upload photo" onclick="document.getElementById('galleryInput').click()">
            <ion-icon name="add" class="fab-icon"></ion-icon>
        </button>

        <div class="overlay-layer" onclick="capturePhoto()">
            <div class="instruction-text" id="ui-tap-to-scan">Tap to Scan</div>
            <div class="sub-text" id="ui-point-camera">Point camera at ingredients</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="{{ url_for('account_page') }}" class="nav-item {% if active_tab == 'account' %}active{% endif %}">
            <ion-icon name="person-circle-outline" class="nav-icon"></ion-icon>
            <span id="ui-account">Account</span>
        </a>

        <a href="{{ url_for('index_page') }}" class="nav-item {% if active_tab == 'scan' %}active{% endif %}">
            <ion-icon name="{{ 'camera' if active_tab == 'scan' else 'camera-outline' }}" class="nav-icon"></ion-icon>
            <span id="ui-scan">Scan</span>
        </a>

        <a href="{{ url_for('chat_page') }}" class="nav-item {% if active_tab == 'chat' %}active{% endif %}">
            <ion-icon name="chatbubble-ellipses-outline" class="nav-icon"></ion-icon>
            <span id="ui-chat">Chat</span>
        </a>
    </div>

    <div id="settings-screen">
        <div class="screen-header-bar">
            <span class="screen-title" id="ui-settings-title">Settings</span>
            <button onclick="hideScreen('settings')" style="border:none; background:none; font-size:24px;">×</button>
        </div>
        <div class="settings-content">
            <div class="setting-group">
                <h3 id="ui-appearance">Appearance / Външен вид</h3>
                <div class="option-row">
                    <div id="opt-light" class="option-btn active" onclick="setMode('light')">Light</div>
                    <div id="opt-dark" class="option-btn" onclick="setMode('dark')">Dark</div>
                </div>
            </div>
            <div class="setting-group">
                <h3 id="ui-unit-system">Unit System / Мерни Единици</h3>
                <div class="option-row">
                    <div id="opt-metric" class="option-btn active" onclick="setUnits('Metric')">Metric (kg)</div>
                    <div id="opt-imperial" class="option-btn" onclick="setUnits('Imperial')">Imperial (lb)</div>
                </div>
            </div>
            <div class="setting-group">
                <h3 id="ui-language-setting">Language / Език</h3>
                <div class="option-row">
                    <div id="opt-english" class="option-btn active" onclick="setLanguage('English')">English</div>
                    <div id="opt-bulgarian" class="option-btn" onclick="setLanguage('Bulgarian')">Български</div>
                </div>
            </div>
        </div>
    </div>

    <div id="analysis-screen">
        <svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" stroke="#000">
            <g fill="none" fill-rule="evenodd">
                <g transform="translate(1 1)" stroke-width="2">
                    <circle stroke-opacity=".5" cx="24" cy="24" r="24"/>
                    <path d="M24 0c13.255 0 24 10.745 24 24">
                        <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
                    </path>
                </g>
            </g>
        </svg>
        <div id="analysis-message">Analyzing Photo...</div>
    </div>

    <div id="results-screen">
        <div class="screen-header-bar">
            <div style="width:40px"></div>
            <span class="screen-title" id="ui-results-title">ChefAI Results</span>
            <button class="btn-secondary" id="ui-new-scan-btn" onclick="resetApp()">New Scan</button>
        </div>
        <div class="recipe-scroll" id="results"></div>
    </div>

    <div id="cooking-screen">
        <div class="cook-header">
            <button onclick="hideScreen('cooking')" style="float:right; border:none; background:none; font-size:24px;">×</button>
            <h2 id="cook-title" style="margin:0; font-size:1.2rem;">Recipe</h2>
            <small id="cook-counter" style="color:#666;">Step 1</small>
        </div>
        <div class="cook-content">
            <div id="cook-text" class="cook-text"></div>
        </div>
        <div class="cook-controls">
            <button id="btn-prev" class="btn-secondary" onclick="changeStep(-1)">Back</button>
            <button id="btn-next" class="btn-primary" onclick="changeStep(1)">Next</button>
        </div>
    </div>

</div>

<script>
    // --- DICTIONARY FOR BULGARIAN SUPPORT ---
    const i18n = {
        'English': {
            'record-ingredients': 'Take a Photo of Ingredients',
            'tap-to-scan': 'Tap to Scan',
            'point-camera': 'Point camera at ingredients',
            'account': 'Account',
            'scan': 'Scan',
            'chat': 'Chat',
            'settings-title': 'Settings',
            'appearance': 'Appearance',
            'unit-system': 'Unit System',
            'language-setting': 'Language',
            'analyzing-photo': 'Analyzing Photo',
            'results-title': 'ChefAI Results',
            'new-scan': 'New Scan',
            'start-cooking': 'Start Cooking',
            'step': 'Step',
            'back': 'Back',
            'next': 'Next',
            'finish': 'Finish',
            'recipe': 'Recipe'
        },
        'Bulgarian': {
            'record-ingredients': 'Снимайте Съставките',
            'tap-to-scan': 'Докоснете за Сканиране',
            'point-camera': 'Насочете камерата към съставките',
            'account': 'Профил',
            'scan': 'Сканиране',
            'chat': 'Чат',
            'settings-title': 'Настройки',
            'appearance': 'Външен вид',
            'unit-system': 'Мерни Единици',
            'language-setting': 'Език',
            'analyzing-photo': 'Анализиране на Снимката',
            'results-title': 'ChefAI Резултати',
            'new-scan': 'Ново Сканиране',
            'start-cooking': 'Започни Готвене',
            'step': 'Стъпка',
            'back': 'Назад',
            'next': 'Напред',
            'finish': 'Край',
            'recipe': 'Рецепта'
        }
    };

    // --- STATE ---
    let videoStream = null;
    let userSettings = { 
        units: localStorage.getItem('chefai_units') || 'Metric', 
        language: localStorage.getItem('chefai_language') || 'English',
        mode: localStorage.getItem('chefai_mode') || 'light'
    };
    
    let currentRecipes = [];
    let currentInstructions = [];
    let stepIndex = 0;

    // --- DOM REFERENCES ---
    const screens = {
        camera: document.getElementById('camera-screen'),
        analysis: document.getElementById('analysis-screen'),
        results: document.getElementById('results-screen'),
        cooking: document.getElementById('cooking-screen'),
        settings: document.getElementById('settings-screen')
    };
    const els = {
        video: document.getElementById('video-feed'),
        canvas: document.getElementById('photoCanvas'),
        results: document.getElementById('results'),
        analysisMsg: document.getElementById('analysis-message'),
        cookTitle: document.getElementById('cook-title'),
        cookText: document.getElementById('cook-text'),
        cookCounter: document.getElementById('cook-counter'),
        btnNext: document.getElementById('btn-next'),
        btnPrev: document.getElementById('btn-prev')
    };
    
    let analysisInterval = null;

    // --- INITIALIZATION & SETTINGS ---
    
    // New function to handle all UI translations
    function translateUI() {
        const lang = userSettings.language;
        const dict = i18n[lang] || i18n['English']; // Fallback to English
        
        // Main Screen
        document.getElementById('ui-record-ingredients').textContent = dict['record-ingredients'];
        document.getElementById('ui-tap-to-scan').textContent = dict['tap-to-scan'];
        document.getElementById('ui-point-camera').textContent = dict['point-camera'];
        
        // Bottom Nav
        document.getElementById('ui-account').textContent = dict['account'];
        document.getElementById('ui-scan').textContent = dict['scan'];
        document.getElementById('ui-chat').textContent = dict['chat'];

        // Settings Screen
        document.getElementById('ui-settings-title').textContent = dict['settings-title'];
        document.getElementById('ui-appearance').innerHTML = `${dict['appearance']} / Външен вид`;
        document.getElementById('ui-unit-system').innerHTML = `${dict['unit-system']} / Мерни Единици`;
        document.getElementById('ui-language-setting').innerHTML = `${dict['language-setting']} / Език`;

        // Analysis Screen
        els.analysisMsg.textContent = dict['analyzing-photo'] + (analysisInterval ? '.' : ''); // Handle if already running
        
        // Results Screen
        document.getElementById('ui-new-scan-btn').textContent = dict['new-scan'];
        document.getElementById('ui-results-title').textContent = dict['results-title'];
        
        // Cooking Screen (Title & Counter updated in updateStep/startCooking)
        els.cookTitle.textContent = dict['recipe'];

        // Re-render recipes if on results screen to update "Start Cooking" button text
        if (currentRecipes.length > 0 && screens.results.style.transform === 'translateY(0)') {
            displayRecipes(currentRecipes);
        }
    }

    function updateSettingsUI() {
        document.getElementById('opt-light').className = `option-btn ${userSettings.mode === 'light' ? 'active' : ''}`;
        document.getElementById('opt-dark').className = `option-btn ${userSettings.mode === 'dark' ? 'active' : ''}`;
        document.getElementById('opt-metric').className = `option-btn ${userSettings.units === 'Metric' ? 'active' : ''}`;
        document.getElementById('opt-imperial').className = `option-btn ${userSettings.units === 'Imperial' ? 'active' : ''}`;
        document.getElementById('opt-english').className = `option-btn ${userSettings.language === 'English' ? 'active' : ''}`;
        document.getElementById('opt-bulgarian').className = `option-btn ${userSettings.language === 'Bulgarian' ? 'active' : ''}`;
        
        if(userSettings.mode === 'dark') document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');

        // Apply translations on any settings change
        translateUI();
    }

    function setMode(m) { userSettings.mode = m; localStorage.setItem('chefai_mode', m); updateSettingsUI(); }
    function setUnits(u) { userSettings.units = u; localStorage.setItem('chefai_units', u); updateSettingsUI(); }
    function setLanguage(l) { 
        userSettings.language = l; 
        localStorage.setItem('chefai_language', l); 
        updateSettingsUI(); 
        if (currentInstructions.length > 0) updateStep(); // Update cooking step text immediately
    }
    updateSettingsUI();

    // --- SCREEN NAVIGATION ---
    function showScreen(name) {
        if (screens[name]) screens[name].style.transform = 'translateY(0)';
        stopCamera();
    }
    
    function hideScreen(name) {
        if (screens[name]) screens[name].style.transform = 'translateY(110%)';
        // Only start camera if not showing analysis/results/cooking
        if (name !== 'analysis' && name !== 'results' && name !== 'cooking') {
            startCamera();
        }
    }

    // --- CAMERA ---
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            videoStream = stream;
            els.video.srcObject = stream;
        } catch(e) { console.error("Could not start camera:", e); }
    }

    function stopCamera() {
        if(videoStream) videoStream.getTracks().forEach(t => t.stop());
    }

    function capturePhoto() {
        if(!videoStream) {
            alert(userSettings.language === 'Bulgarian'
                ? "Камерата не е активна. Моля, използвайте + бутона за качване в ъгъла."
                : "Camera feed not active. Please use the + upload button in the corner.");
            return;
        }
        
        const ctx = els.canvas.getContext('2d');
        els.canvas.width = els.video.videoWidth;
        els.canvas.height = els.video.videoHeight;
        ctx.drawImage(els.video, 0, 0);
        
        els.canvas.toBlob(blob => { 
            const file = new File([blob], "capture.jpg", { type: 'image/jpeg' });
            analyzeImage(file); 
        }, 'image/jpeg', 0.9);
    }

    function handleGalleryUpload() {
        const file = document.getElementById('galleryInput').files[0];
        if(file) analyzeImage(file);
    }

    // --- ANALYSIS API ---
    async function analyzeImage(file) {
        showScreen('analysis');
        
        let dots = 0;
        const baseTxt = i18n[userSettings.language]['analyzing-photo'];
        if (analysisInterval) clearInterval(analysisInterval);
        analysisInterval = setInterval(() => {
            dots = (dots + 1) % 4;
            els.analysisMsg.textContent = baseTxt + '.'.repeat(dots);
        }, 500);

        const formData = new FormData();
        formData.append('image', file);
        formData.append('language', userSettings.language);
        formData.append('units', userSettings.units);

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Server returned a non-success response.');
            }

            const data = await response.json();
            
            clearInterval(analysisInterval); 
            analysisInterval = null;

            if (data.recipes) {
                displayRecipes(data.recipes);
                showScreen('results');
            } else {
                alert(userSettings.language === 'Bulgarian' ? "Анализът не успя: Не бяха намерени рецепти." : "Analysis failed: Could not retrieve recipes.");
                resetApp();
            }
        } catch(e) {
            console.error("API Error:", e);
            
            if (analysisInterval) clearInterval(analysisInterval);
            analysisInterval = null;
            
            alert(`${i18n[userSettings.language]['analyzing-photo']} ${i18n[userSettings.language]['finish']}: ${e.message}`);
            resetApp();
        }
    }

    function displayRecipes(recipes) {
        currentRecipes = recipes;
        els.results.innerHTML = '';
        const btnText = i18n[userSettings.language]['start-cooking'];

        recipes.forEach((r, idx) => {
            const div = document.createElement('div');
            div.className = 'recipe-card';
            div.innerHTML = `
                <div class="recipe-header">
                    <img src="${r.image_url}" class="recipe-img" alt="${r.title}">
                    <div class="recipe-stats">
                        <div class="stat-box time-box">
                            <ion-icon name="time-outline"></ion-icon>
                            ${(r.time_minutes ?? 0)} min
                        </div>
                        <div class="stat-box skill-box ${r.skill_level || ''}">${r.skill_level || ''}</div>
                    </div>
                </div>
                <div class="recipe-body">
                    <h3 class="recipe-title">${r.title}</h3>
                    <p style="color:inherit; font-size:0.9rem; opacity:0.8;">${r.description}</p>
                    <button class="btn-primary" style="width:100%; margin-top:15px;" onclick="startCooking(${idx})">${btnText}</button>
                </div>
            `;
            els.results.appendChild(div);
        });
    }

    // --- COOKING ---
    function startCooking(idx) {
        currentInstructions = currentRecipes[idx].instructions;
        els.cookTitle.textContent = currentRecipes[idx].title;
        stepIndex = 0;
        updateStep();
        showScreen('cooking');
    }

    function updateStep() {
        const dict = i18n[userSettings.language];
        els.cookText.textContent = currentInstructions[stepIndex];
        const stepWord = dict['step'];
        els.cookCounter.textContent = `${stepWord} ${stepIndex + 1} / ${currentInstructions.length}`;
        
        const backTxt = dict['back'];
        const nextTxt = dict['next'];
        const finTxt = dict['finish'];

        els.btnPrev.textContent = backTxt;
        els.btnPrev.disabled = stepIndex === 0;
        
        if(stepIndex === currentInstructions.length - 1) {
            els.btnNext.textContent = finTxt;
            els.btnNext.onclick = () => hideScreen('cooking');
        } else {
            els.btnNext.textContent = nextTxt;
            els.btnNext.onclick = () => changeStep(1);
        }
    }

    function changeStep(dir) {
        if(stepIndex + dir >= 0 && stepIndex + dir < currentInstructions.length) {
            stepIndex += dir;
            updateStep();
        }
    }

    function resetApp() { 
        hideScreen('results'); 
        hideScreen('analysis');
        hideScreen('cooking');
        startCamera();
    }

    function checkUrlHash() {
        const hash = window.location.hash;
        if (hash === '#settings') {
            showScreen('settings');
        } else if (hash === '#upload') {
            document.getElementById('galleryInput').click();
        }
    }

    startCamera();
    checkUrlHash();
</script>
</body>
</html>
